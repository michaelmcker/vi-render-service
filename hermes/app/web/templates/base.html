<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Hermes — {% block title %}{% endblock %}</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { -webkit-font-smoothing: antialiased; }
    pre { white-space: pre-wrap; word-break: break-word; }
  </style>
</head>
<body class="bg-slate-950 text-slate-100 min-h-screen">
  <header class="border-b border-slate-800 bg-slate-900/60 sticky top-0 backdrop-blur z-10">
    <div class="max-w-3xl mx-auto px-4 py-3 flex items-center justify-between">
      <a href="/" class="font-semibold tracking-tight text-lg">Hermes</a>
      <nav class="text-sm flex gap-4">
        <a class="hover:text-white text-slate-300" href="/">Status</a>
        <a class="hover:text-white text-slate-300" href="/drafts">Drafts</a>
        <a class="hover:text-white text-slate-300" href="/linkedin">LinkedIn</a>
        <a class="hover:text-white text-slate-300" href="/logs">Logs</a>
      </nav>
    </div>
  </header>

  <main class="max-w-3xl mx-auto px-4 py-6 pb-20">
    {% block content %}{% endblock %}
  </main>

  <footer class="text-center text-xs text-slate-500 pb-8">
    signed in as <span class="text-slate-300">{{ user }}</span>
  </footer>
</body>
</html>
