{% extends "base.html" %}
{% block title %}Logs{% endblock %}
{% block content %}

<h1 class="text-2xl font-semibold mb-1">Logs</h1>
<p class="text-slate-400 text-sm mb-6">
  Last ~60 lines per service. For deeper inspection, SSH and tail
  <code>/opt/hermes/logs/</code>.
</p>

{% for fname, content in logs.items() %}
<details class="mb-3 rounded-lg border border-slate-800 bg-slate-900/50">
  <summary class="cursor-pointer px-4 py-3 font-medium">{{ fname }}</summary>
  <pre class="text-xs text-slate-300 px-4 py-3 border-t border-slate-800 overflow-x-auto">{{ content }}</pre>
</details>
{% endfor %}

{% endblock %}
