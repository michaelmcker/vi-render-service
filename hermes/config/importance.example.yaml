# Hermes importance rules.
# Copy to importance.yaml and edit. The daemon hot-reloads on file change.
#
# Use the Telegram bot to edit live: /vip add ceo@acme.com, /watch #deals, etc.
# Direct YAML edits are also fine.

email:
  # Categories where Hermes flags but never auto-drafts. Hard policy — even
  # if she taps Draft, the bot refuses and asks her to write manually.
  # Categories come from prompts/triage.md classifier.
  no_draft_categories:
    - hr
    - personal

  # Senders that always trigger an alert, no LLM second-guessing.
  vip_senders:
    - bookings@verticalimpression.com
    # - ceo@bigprospect.com

  # Whole domains worth flagging.
  vip_domains:
    - verticalimpression.com  # internal — flag founders, leadership, etc.

  # Account names to watch across senders + bodies (case-insensitive substring).
  watched_accounts:
    # - "Acme Corp"
    # - "Globex"

  # Keywords/phrases that bump priority regardless of sender.
  signal_keywords:
    - "renewal"
    - "contract"
    - "pricing"
    - "introduction"
    - "intro to"
    - "warm intro"
    - "decision"
    - "next steps"

  # Senders to always demote (newsletters, calendar invites from herself, etc.).
  mute_senders:
    - calendar-notification@google.com
    - noreply@
    - no-reply@

  mute_subject_patterns:
    - "out of office"
    - "automatic reply"

slack:
  alert_on_dm: true
  alert_on_mention: true

  # Channels where every message gets a "needs response?" classifier pass.
  monitor_channels:
    # - "#deals-pipeline"
    # - "#cs-escalations"
    # - "#leadership"

  # Slack user IDs (preferred) or emails. Get IDs via /vip add @user in Telegram.
  vip_users:
    # - U0123ABC
    # - ceo@verticalimpression.com

  # If the LLM classifier is on, it decides whether a message needs her attention.
  # Set false to alert on EVERY message in monitor_channels (firehose).
  needs_response_classifier: true

# Drafting style — used for both email and Slack drafts.
voice:
  tone: "warm, direct, sales-leader. Short sentences. No corporate fluff."
  signoff: "— Nikki"
  forbidden_phrases:
    - "I hope this email finds you well"
    - "circling back"
    - "synergy"
  examples:
    # Paste 2-3 of her actual past replies here for style grounding.
    # The daemon reads this verbatim into the draft prompt.
    - |
      Subject: Re: pricing for Q3
      Hey Sam — yes, the numbers we discussed still hold. I'll send a one-pager
      tomorrow morning with the breakdown. Quick Q: who else from your side
      should be on that thread?
      — Nikki

linkedin:
  # Core people whose posts she wants to engage on. Hermes scrapes their
  # /recent-activity/ pages via Playwright (using a SECONDARY LinkedIn
  # account, never her real one). Engagement opp suggestions get pushed
  # to Telegram with a link + suggested comment. She executes manually
  # on her phone with her real account.
  #
  # Add via Telegram: /lwatch <linkedin_url> <name> [reason]
  watched_people:
    # - linkedin_url: https://www.linkedin.com/in/john-smith-123
    #   name: John Smith
    #   reason: Acme CMO, key champion

  # Topics that warrant comment suggestions from anyone.
  topic_interests:
    # - "B2B sales"
    # - "ICP design"
    # - "RevOps"

  # Engagement thresholds for routing.
  min_likes_for_engagement: 5
  thought_leadership_min_likes: 100
  thought_leadership_min_comments: 20

# Notification noise budget + cadence.
budget:
  max_alerts_per_hour: 8
  morning_briefing_at: "07:00"
  quiet_hours: "21:00-07:00"
  linkedin_scan_times: ["08:00", "16:00"]
  thought_leadership_weekly_at: "Sunday 09:00"
  backup_times: ["07:00", "19:00"]

  # Adaptive ramp: after this many approved drafts, posture auto-graduates
  # from "conservative" (Draft on tap) to "pre_draft" (every flagged item
  # gets a draft attached). Override with /posture in Telegram.
  adaptive_ramp_threshold: 50
